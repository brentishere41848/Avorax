name: Desktop Packages

on:
  workflow_dispatch:
    inputs:
      version:
        description: Numeric package version used inside MSI/DEB/app metadata
        required: true
        default: "0.1.15"
      release_tag:
        description: Prerelease tag used only when publication is enabled
        required: true
        default: "v0.1.15-beta.1"
      publish_prerelease:
        description: Publish verified assets as a GitHub prerelease from main
        required: true
        type: boolean
        default: false
  pull_request:
    paths:
      - ".github/workflows/desktop-packages.yml"
      - "Cargo.lock"
      - "README.md"
      - "apps/zentor_client/**"
      - "assets/**"
      - "core/**"
      - "docs/installers.md"
      - "installer/**"
      - "ml/requirements.lock.txt"
      - "packages/**"
      - "services/api/Cargo.lock"
      - "tests/test_packaging_tools.py"
      - "tools/packaging/**"
  push:
    branches:
      - main
      - "agent/**"
    paths:
      - ".github/workflows/desktop-packages.yml"
      - "Cargo.lock"
      - "README.md"
      - "apps/zentor_client/**"
      - "assets/**"
      - "core/**"
      - "docs/installers.md"
      - "installer/**"
      - "ml/requirements.lock.txt"
      - "packages/**"
      - "services/api/Cargo.lock"
      - "tests/test_packaging_tools.py"
      - "tools/packaging/**"

concurrency:
  group: desktop-packages-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  AVORAX_PACKAGE_VERSION: ${{ inputs.version || '0.1.15' }}
  FLUTTER_VERSION: "3.44.4"
  RUST_TOOLCHAIN: "1.96.1"
  PYTHON_VERSION: "3.12"

jobs:
  package-contracts:
    name: Package contracts
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Setup Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Validate package tooling
        run: |
          python -m unittest discover -s tests -p "test_packaging_tools.py" -v
          python -m py_compile \
            tools/packaging/package_manifest.py \
            tools/packaging/smoke_local_core.py \
            tools/packaging/create_release_checksums.py \
            tools/packaging/create_dependency_sbom.py
          bash -n \
            installer/common/stage-desktop-payload.sh \
            installer/linux/build-linux.sh \
            installer/macos/build-macos.sh
          stage_root="$(mktemp -d)"
          source installer/common/stage-desktop-payload.sh
          stage_avorax_desktop_payload "$PWD" "$stage_root/payload"
          test -f "$stage_root/payload/engine/signatures/avorax_core.asig"
          test ! -e "$stage_root/payload/engine/signatures/zentor_core.zsig"
          test -f "$stage_root/payload/engine/rules/avorax_core.arule"
          test ! -e "$stage_root/payload/engine/rules/zentor_rules.zrule"
          git diff --check

  windows:
    name: Windows x64 MSI and EXE
    needs: package-contracts
    runs-on: windows-2022
    timeout-minutes: 100
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}

      - name: Setup Flutter
        uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2
        with:
          channel: stable
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5.4.0
        with:
          dotnet-version: 9.0.x

      - name: Setup Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Validate version
        shell: pwsh
        run: |
          if ($env:AVORAX_PACKAGE_VERSION -notmatch '^[0-9]+\.[0-9]+\.[0-9]+$') {
            throw "Windows MSI version must be numeric X.Y.Z."
          }

      - name: Flutter analysis and focused package UI tests
        working-directory: apps/zentor_client
        run: |
          flutter pub get
          flutter analyze
          flutter test test/update_ui_test.dart test/update_controller_test.dart --reporter compact

      - name: Packaging unit tests
        run: python -m unittest discover -s tests -p "test_packaging_tools.py" -v

      - name: Dependency and license evidence
        shell: pwsh
        run: |
          .\tools\security\avorax-dependency-evidence.ps1 `
            -RepoRoot . `
            -ReportPath dist\dependency-evidence\dependency-evidence.json

      - name: Build Flutter Windows application
        working-directory: apps/zentor_client
        shell: pwsh
        run: |
          $buildNumber = ($env:AVORAX_PACKAGE_VERSION -replace '[^0-9]', '')
          flutter build windows --release `
            --build-name $env:AVORAX_PACKAGE_VERSION `
            --build-number $buildNumber `
            --dart-define="AVORAX_APP_VERSION=$env:AVORAX_PACKAGE_VERSION" `
            --dart-define="ZENTOR_APP_VERSION=$env:AVORAX_PACKAGE_VERSION" `
            --dart-define=AVORAX_UPDATE_CHANNEL=dev `
            --dart-define=AVORAX_UPDATES_REPO_OWNER=brentishere41848 `
            --dart-define=AVORAX_UPDATES_REPO_NAME=Avorax

      - name: Build Rust desktop services
        run: >-
          cargo build --locked --release
          --package zentor_local_core
          --package zentor_guard_service
          --package avorax_update_service

      - name: Restore pinned WiX tool
        run: dotnet tool restore

      - name: Build MSI and setup EXE
        shell: pwsh
        run: |
          $dotnet = (Get-Command dotnet -CommandType Application -ErrorAction Stop).Source
          $cargo = (Get-Command cargo -CommandType Application -ErrorAction Stop).Source
          $flutter = (Get-Command flutter -ErrorAction Stop).Source
          .\installer\windows\build-msi.ps1 `
            -Version $env:AVORAX_PACKAGE_VERSION `
            -SkipFlutterBuild `
            -RequireLocalCore `
            -AllowDevelopmentModel `
            -DotnetPath $dotnet `
            -CargoPath $cargo `
            -FlutterPath $flutter

      - name: Verify staged Windows payload
        shell: pwsh
        run: |
          .\tools\windows\avorax-installer-stage-test.ps1 `
            -StagePath (Resolve-Path dist\windows-msi\stage).Path
          New-Item -ItemType Directory -Path dist\windows-msi\verification -Force | Out-Null
          $python = (Get-Command python -CommandType Application -ErrorAction Stop).Source
          & $python tools\packaging\smoke_local_core.py `
            --core dist\windows-msi\stage\avorax_core_service.exe `
            --engine-root dist\windows-msi\stage `
            --report dist\windows-msi\verification\windows-stage-core-smoke.json
          if ($LASTEXITCODE -ne 0) { throw "Windows staged core smoke failed." }

      - name: Administratively extract MSI without installing
        shell: pwsh
        run: |
          $msi = (Resolve-Path "dist\Avorax-AntiVirus-$env:AVORAX_PACKAGE_VERSION-x64.msi").Path
          $extractRoot = Join-Path $env:RUNNER_TEMP ("avorax-msi-admin-" + [Guid]::NewGuid().ToString("N"))
          New-Item -ItemType Directory -Path $extractRoot -ErrorAction Stop | Out-Null
          $log = Join-Path (Resolve-Path dist\windows-msi\verification).Path "msi-admin-extract.log"
          $msiexec = Join-Path $env:SystemRoot "System32\msiexec.exe"
          $arguments = @(
            "/a"
            "`"$msi`""
            "/qn"
            "TARGETDIR=`"$extractRoot`""
            "/l*v"
            "`"$log`""
          )
          $process = Start-Process `
            -FilePath $msiexec `
            -ArgumentList $arguments `
            -Wait `
            -PassThru `
            -WindowStyle Hidden
          if ($process.ExitCode -ne 0) {
            throw "MSI administrative extraction failed with exit code $($process.ExitCode)."
          }
          $apps = @(Get-ChildItem -LiteralPath $extractRoot -Filter Avorax.exe -File -Recurse -ErrorAction Stop)
          if ($apps.Count -ne 1) {
            throw "Expected exactly one administratively extracted Avorax.exe, found $($apps.Count)."
          }
          $installedRoot = $apps[0].Directory.FullName
          foreach ($name in @("avorax_core_service.exe", "avorax_guard_service.exe", "engine")) {
            if (-not (Test-Path -LiteralPath (Join-Path $installedRoot $name))) {
              throw "Administrative image is missing $name."
            }
          }
          $python = (Get-Command python -CommandType Application -ErrorAction Stop).Source
          & $python tools\packaging\smoke_local_core.py `
            --core (Join-Path $installedRoot "avorax_core_service.exe") `
            --engine-root $installedRoot `
            --report dist\windows-msi\verification\windows-msi-extracted-core-smoke.json
          if ($LASTEXITCODE -ne 0) { throw "Extracted MSI core smoke failed." }
          [IO.File]::WriteAllText(
            (Join-Path (Resolve-Path dist\windows-msi\verification).Path "msi-admin-root.txt"),
            $installedRoot + [Environment]::NewLine,
            [Text.UTF8Encoding]::new($false)
          )

      - name: Record unsigned status and checksums
        shell: pwsh
        run: |
          $files = @(
            (Resolve-Path "dist\Avorax-AntiVirus-$env:AVORAX_PACKAGE_VERSION-x64.msi").Path,
            (Resolve-Path "dist\Avorax-AntiVirus-$env:AVORAX_PACKAGE_VERSION-x64-setup.exe").Path
          )
          $rows = foreach ($path in $files) {
            $signature = Get-AuthenticodeSignature -LiteralPath $path
            if ([string]$signature.Status -ne "NotSigned") {
              throw "Unsigned beta expected NotSigned for $path, got $($signature.Status)."
            }
            [ordered]@{
              file = Split-Path $path -Leaf
              bytes = (Get-Item -LiteralPath $path).Length
              authenticode_status = [string]$signature.Status
              sha256 = (Get-FileHash -LiteralPath $path -Algorithm SHA256).Hash.ToLowerInvariant()
            }
          }
          $json = $rows | ConvertTo-Json -Depth 4
          [IO.File]::WriteAllText(
            (Join-Path (Resolve-Path dist\windows-msi\verification).Path "windows-signing-status.json"),
            $json + [Environment]::NewLine,
            [Text.UTF8Encoding]::new($false)
          )
          $checksumLines = $rows | ForEach-Object { "$($_.sha256)  $($_.file)" }
          [IO.File]::WriteAllLines(
            (Join-Path (Resolve-Path dist).Path "SHA256SUMS-windows.txt"),
            $checksumLines,
            [Text.UTF8Encoding]::new($false)
          )

      - name: Upload Windows package evidence
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: avorax-package-windows-${{ env.AVORAX_PACKAGE_VERSION }}
          if-no-files-found: error
          retention-days: 14
          path: |
            dist/Avorax-AntiVirus-${{ env.AVORAX_PACKAGE_VERSION }}-x64.msi
            dist/Avorax-AntiVirus-${{ env.AVORAX_PACKAGE_VERSION }}-x64-setup.exe
            dist/SHA256SUMS-windows.txt
            dist/windows-msi/verification/**
            dist/dependency-evidence/dependency-evidence.json

  linux:
    name: Linux x64 DEB and tar
    needs: package-contracts
    runs-on: ubuntu-24.04
    timeout-minutes: 100
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Install native build prerequisites
        run: |
          sudo apt-get update
          sudo apt-get install --no-install-recommends -y \
            clang cmake desktop-file-utils libgtk-3-dev liblzma-dev ninja-build pkg-config

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}

      - name: Setup Flutter
        uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2
        with:
          channel: stable
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Setup Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Validate package tooling
        run: python -m unittest discover -s tests -p "test_packaging_tools.py" -v

      - name: Flutter analysis and focused package UI tests
        working-directory: apps/zentor_client
        run: |
          flutter pub get
          flutter analyze
          flutter test test/update_ui_test.dart test/update_controller_test.dart --reporter compact

      - name: Build and verify Linux packages
        run: bash installer/linux/build-linux.sh --version "$AVORAX_PACKAGE_VERSION"

      - name: Upload Linux package evidence
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: avorax-package-linux-${{ env.AVORAX_PACKAGE_VERSION }}
          if-no-files-found: error
          retention-days: 14
          path: |
            dist/Avorax-AntiVirus-${{ env.AVORAX_PACKAGE_VERSION }}-linux-x64.deb
            dist/Avorax-AntiVirus-${{ env.AVORAX_PACKAGE_VERSION }}-linux-x64.tar.gz
            dist/SHA256SUMS-linux.txt
            dist/linux/verification/**

  macos:
    name: macOS ${{ matrix.arch }} DMG
    needs: package-contracts
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-15
            arch: arm64
            host_arch: arm64
          - runner: macos-15-intel
            arch: x64
            host_arch: x86_64
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 100
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}

      - name: Setup Flutter
        uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2
        with:
          channel: stable
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Setup Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Confirm native runner architecture
        run: |
          test "$(uname -m)" = "${{ matrix.host_arch }}"

      - name: Validate package tooling
        run: python -m unittest discover -s tests -p "test_packaging_tools.py" -v

      - name: Flutter analysis and focused package UI tests
        working-directory: apps/zentor_client
        run: |
          flutter pub get
          flutter analyze
          flutter test test/update_ui_test.dart test/update_controller_test.dart --reporter compact

      - name: Build and verify macOS package
        run: bash installer/macos/build-macos.sh --version "$AVORAX_PACKAGE_VERSION"

      - name: Upload macOS package evidence
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: avorax-package-macos-${{ matrix.arch }}-${{ env.AVORAX_PACKAGE_VERSION }}
          if-no-files-found: error
          retention-days: 14
          path: |
            dist/Avorax-AntiVirus-${{ env.AVORAX_PACKAGE_VERSION }}-macos-${{ matrix.arch }}.dmg
            dist/SHA256SUMS-macos-${{ matrix.arch }}.txt
            dist/macos-${{ matrix.arch }}/verification/**

  release-assets:
    name: Consolidate and checksum
    needs:
      - windows
      - linux
      - macos
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Setup Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Download native package artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: avorax-package-*-${{ env.AVORAX_PACKAGE_VERSION }}
          path: release-assets
          merge-multiple: true

      - name: Require six release artifacts, create lockfile SBOM, and checksum all evidence
        run: |
          mapfile -t artifacts < <(
            find release-assets -type f \
              \( -name '*.msi' -o -name '*-setup.exe' -o -name '*.deb' -o -name '*.tar.gz' -o -name '*.dmg' \) \
              -print | sort
          )
          if [[ "${#artifacts[@]}" -ne 6 ]]; then
            printf 'Expected six release artifacts, found %s\n' "${#artifacts[@]}" >&2
            printf '%s\n' "${artifacts[@]}" >&2
            exit 1
          fi
          python tools/packaging/create_dependency_sbom.py \
            --version "$AVORAX_PACKAGE_VERSION" \
            --cargo-lock Cargo.lock \
            --cargo-lock core/zentor_native_engine/Cargo.lock \
            --cargo-lock core/zentor_local_core/Cargo.lock \
            --cargo-lock core/zentor_guard_service/Cargo.lock \
            --cargo-lock services/api/Cargo.lock \
            --pub-lock apps/zentor_client/pubspec.lock \
            --pub-lock packages/zentor_protocol/pubspec.lock \
            --pub-lock packages/avorax_protocol/pubspec.lock \
            --requirements-lock ml/requirements.lock.txt \
            --output "release-assets/Avorax-AntiVirus-${AVORAX_PACKAGE_VERSION}-lockfile.cdx.json"
          python tools/packaging/create_release_checksums.py \
            --input-dir release-assets \
            --output release-assets/SHA256SUMS.txt
          cat release-assets/SHA256SUMS.txt

      - name: Upload consolidated release assets
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: avorax-desktop-release-${{ env.AVORAX_PACKAGE_VERSION }}
          if-no-files-found: error
          retention-days: 30
          path: |
            release-assets/*.msi
            release-assets/*-setup.exe
            release-assets/*.deb
            release-assets/*.tar.gz
            release-assets/*.dmg
            release-assets/*.cdx.json
            release-assets/SHA256SUMS.txt

  publish-prerelease:
    name: Publish desktop beta prerelease
    needs: release-assets
    if: >-
      github.event_name == 'workflow_dispatch' &&
      inputs.publish_prerelease &&
      github.ref == 'refs/heads/main'
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    timeout-minutes: 15
    steps:
      - name: Validate release tag
        env:
          RELEASE_TAG: ${{ inputs.release_tag }}
        run: |
          if [[ ! "$RELEASE_TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+-beta\.[0-9]+$ ]]; then
            printf 'Release tag must match vX.Y.Z-beta.N\n' >&2
            exit 1
          fi

      - name: Download consolidated release assets
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: avorax-desktop-release-${{ env.AVORAX_PACKAGE_VERSION }}
          path: release-assets

      - name: Publish GitHub prerelease
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3.0.1
        with:
          tag_name: ${{ inputs.release_tag }}
          name: Avorax Desktop Beta ${{ inputs.release_tag }}
          prerelease: true
          fail_on_unmatched_files: true
          body: |
            Avorax Desktop Beta is experimental and must not be used as the only
            antivirus on a device. Keep Microsoft Defender or another supported
            antivirus enabled.

            This prerelease contains unsigned Windows and Linux packages plus
            ad-hoc-signed, non-notarized macOS packages. No package includes
            verified kernel or pre-execution blocking. Verify SHA256SUMS.txt
            before opening an installer. The included lockfile CycloneDX file
            is a partial dependency inventory, not a complete license review or
            final-binary SBOM.
          files: |
            release-assets/*.msi
            release-assets/*-setup.exe
            release-assets/*.deb
            release-assets/*.tar.gz
            release-assets/*.dmg
            release-assets/*.cdx.json
            release-assets/SHA256SUMS.txt

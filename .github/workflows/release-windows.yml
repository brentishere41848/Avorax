name: Windows Release Installers

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version without v prefix"
        required: true
        default: "0.1.0"
      allow_development_model:
        description: "Allow installer build when AI model metadata has production_ready=false"
        required: true
        type: boolean
        default: true

permissions:
  contents: write

jobs:
  build-windows-installers:
    name: Build MSI and EXE
    runs-on: windows-2022

    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Resolve version
        id: version
        shell: pwsh
        run: |
          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            $version = "${{ inputs.version }}"
          } else {
            $version = "${{ github.ref_name }}".TrimStart("v")
          }
          $buildNumber = ($version -replace "[^0-9]", "")
          if ([string]::IsNullOrWhiteSpace($buildNumber)) {
            $buildNumber = "1"
          }
          "version=$version" >> $env:GITHUB_OUTPUT
          "build_number=$buildNumber" >> $env:GITHUB_OUTPUT
          "tag=v$version" >> $env:GITHUB_OUTPUT

      - name: Install Rust
        uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88

      - name: Setup Flutter
        uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2
        with:
          channel: stable
          flutter-version: 3.44.0

      - name: Setup .NET
        uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4
        with:
          dotnet-version: 9.0.x

      - name: Restore Flutter dependencies
        working-directory: apps/zentor_client
        run: flutter pub get

      - name: Restore WiX tool
        run: dotnet tool restore

      - name: Release prerequisite preflight
        shell: pwsh
        run: |
          $dotnet = (Get-Command dotnet -CommandType Application -ErrorAction Stop).Source
          $cargo = (Get-Command cargo -CommandType Application -ErrorAction Stop).Source
          $flutter = (Get-Command flutter -CommandType Application -ErrorAction Stop).Source
          .\tools\windows\avorax-release-prereq-check.ps1 -RepoRoot . -DotnetPath $dotnet -CargoPath $cargo -FlutterPath $flutter -ReportPath dist\release-prereq\release_prereq_report.json -HostOnly

      - name: Upload release prerequisite report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: avorax-release-prereq-${{ steps.version.outputs.version }}
          path: dist/release-prereq/release_prereq_report.json
          if-no-files-found: error

      - name: Dependency evidence gate
        shell: pwsh
        run: .\tools\security\avorax-dependency-evidence.ps1 -RepoRoot . -ReportPath dist\dependency-evidence\dependency_evidence.json

      - name: Upload dependency evidence report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: avorax-dependency-evidence-${{ steps.version.outputs.version }}
          path: dist/dependency-evidence/dependency_evidence.json
          if-no-files-found: error

      - name: Validate update signing configuration
        shell: pwsh
        env:
          AVORAX_UPDATE_PUBLIC_KEY_HEX: ${{ secrets.AVORAX_UPDATE_PUBLIC_KEY_HEX }}
          AVORAX_UPDATE_SIGNING_PRIVATE_KEY_HEX: ${{ secrets.AVORAX_UPDATE_SIGNING_PRIVATE_KEY_HEX }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:AVORAX_UPDATE_PUBLIC_KEY_HEX)) {
            throw "AVORAX_UPDATE_PUBLIC_KEY_HEX secret is required for release builds."
          }
          if ([string]::IsNullOrWhiteSpace($env:AVORAX_UPDATE_SIGNING_PRIVATE_KEY_HEX)) {
            throw "AVORAX_UPDATE_SIGNING_PRIVATE_KEY_HEX secret is required to publish signed .aup updates."
          }

      - name: Build Flutter Windows app
        working-directory: apps/zentor_client
        run: flutter build windows --release --build-name "${{ steps.version.outputs.version }}" --build-number "${{ steps.version.outputs.build_number }}" --dart-define=AVORAX_APP_VERSION="${{ steps.version.outputs.version }}" --dart-define=ZENTOR_APP_VERSION="${{ steps.version.outputs.version }}" --dart-define=AVORAX_UPDATE_FEED_URL=https://github.com/brentishere41848/Avorax/releases/latest/download/update-feed.json --dart-define=AVORAX_UPDATE_CHANNEL=dev --dart-define=AVORAX_UPDATES_REPO_OWNER=brentishere41848 --dart-define=AVORAX_UPDATES_REPO_NAME=Avorax

      - name: Build local scan core
        working-directory: core/zentor_local_core
        run: cargo build --release

      - name: Build guard service
        working-directory: core/zentor_guard_service
        run: cargo build --release

      - name: Build update service
        working-directory: core/avorax_update_service
        env:
          AVORAX_UPDATE_PUBLIC_KEY_HEX: ${{ secrets.AVORAX_UPDATE_PUBLIC_KEY_HEX }}
        run: cargo build --release

      - name: Package Windows installers
        shell: pwsh
        run: |
          $scriptArgs = @{
            Version = "${{ steps.version.outputs.version }}"
            RequireLocalCore = $true
            SkipFlutterBuild = $true
          }
          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            if ("${{ inputs.allow_development_model }}" -eq "true") {
              $scriptArgs.AllowDevelopmentModel = $true
            }
          } else {
            function Get-BoundedJsonDiagnostic([object]$Value) {
              if ($null -eq $Value) { return "" }
              $text = [string]$Value
              if ($text.Length -le 4096) { return $text }
              return $text.Substring(0, 4096) + "...[truncated]"
            }
            function Read-TextFileBounded([System.IO.FileInfo]$Item, [int]$MaxBytes, [string]$Description) {
              if ($MaxBytes -le 0) {
                throw "$Description maximum byte count must be positive."
              }
              $stream = [System.IO.File]::Open(
                $Item.FullName,
                [System.IO.FileMode]::Open,
                [System.IO.FileAccess]::Read,
                [System.IO.FileShare]::Read
              )
              try {
                if ($stream.Length -gt $MaxBytes) {
                  throw "$Description exceeds $MaxBytes bytes: $($Item.FullName)"
                }
                $length = [int]$stream.Length
                if ($length -eq 0) { return "" }
                $buffer = [byte[]]::new($length)
                $offset = 0
                while ($offset -lt $length) {
                  $read = $stream.Read($buffer, $offset, $length - $offset)
                  if ($read -le 0) {
                    throw "$Description could not be read completely: $($Item.FullName)"
                  }
                  $offset += $read
                }
                if ($length -ge 3 -and $buffer[0] -eq 0xEF -and $buffer[1] -eq 0xBB -and $buffer[2] -eq 0xBF) {
                  return [System.Text.Encoding]::UTF8.GetString($buffer, 3, $length - 3)
                }
                if ($length -ge 2 -and $buffer[0] -eq 0xFF -and $buffer[1] -eq 0xFE) {
                  return [System.Text.Encoding]::Unicode.GetString($buffer, 2, $length - 2)
                }
                if ($length -ge 2 -and $buffer[0] -eq 0xFE -and $buffer[1] -eq 0xFF) {
                  return [System.Text.Encoding]::BigEndianUnicode.GetString($buffer, 2, $length - 2)
                }
                $utf8 = New-Object System.Text.UTF8Encoding($false, $true)
                return $utf8.GetString($buffer)
              } finally {
                $stream.Dispose()
              }
            }
            function Read-JsonFile([string]$Path, [string]$Description) {
              $item = Get-Item -LiteralPath $Path -Force -ErrorAction Stop
              if (($item.Attributes -band [System.IO.FileAttributes]::ReparsePoint) -ne 0) {
                throw "$Description must not be a reparse point: $Path"
              }
              if (-not ($item -is [System.IO.FileInfo])) {
                throw "$Description is not a regular file: $Path"
              }
              if ($item.Length -gt 1048576) {
                throw "$Description exceeds 1048576 bytes: $Path"
              }
              try {
                $json = Read-TextFileBounded $item 1048576 $Description
                return ConvertFrom-Json -InputObject $json -ErrorAction Stop
              } catch {
                throw "$Description is not valid bounded JSON: $(Get-BoundedJsonDiagnostic $_.Exception.Message)"
              }
            }
            $metadata = Read-JsonFile "assets\models\zentor_static_malware_model.metadata.json" "AI model metadata"
            $productionReadyProperty = $metadata.PSObject.Properties["production_ready"]
            if ($null -eq $productionReadyProperty -or -not ($productionReadyProperty.Value -is [bool])) {
              throw "AI model metadata production_ready must be a JSON boolean."
            }
            if (-not $productionReadyProperty.Value) {
              $scriptArgs.AllowDevelopmentModel = $true
            }
          }
          try {
            & .\installer\windows\build-msi.ps1 @scriptArgs
          } catch {
            $message = $_.Exception.Message
            $message = $message.Replace("%", "%25").Replace("`r", "%0D").Replace("`n", "%0A")
            Write-Host "::error title=Avorax installer packaging failed::$message"
            throw
          }

      - name: Build signed update package
        shell: pwsh
        env:
          AVORAX_UPDATE_PUBLIC_KEY_ID: avorax-prod-ed25519
          AVORAX_UPDATE_SIGNING_PRIVATE_KEY_HEX: ${{ secrets.AVORAX_UPDATE_SIGNING_PRIVATE_KEY_HEX }}
        run: |
          $cargo = (Get-Command cargo -CommandType Application -ErrorAction Stop).Source
          if ([string]::IsNullOrWhiteSpace($cargo) -or -not (Test-Path -LiteralPath $cargo -PathType Leaf)) {
            throw "Unable to resolve a concrete Cargo executable path for update manifest signing."
          }
          $cargoLiteral = $cargo.Replace("'", "''")
          $signer = Join-Path $PWD "dist\sign-update-manifest.ps1"
          $signerDirectory = Split-Path $signer
          [System.IO.Directory]::CreateDirectory($signerDirectory) | Out-Null
          if (Test-Path -LiteralPath $signer) {
            $signerItem = Get-Item -LiteralPath $signer -Force -ErrorAction Stop
            if (($signerItem.Attributes -band [System.IO.FileAttributes]::ReparsePoint) -ne 0 -or -not ($signerItem -is [System.IO.FileInfo])) {
              throw "Update signer helper target must be a regular non-reparse file: $signer"
            }
          }
          $signerScript = @"
          param(
            [Parameter(Mandatory = $true)][string]$ManifestPath,
            [Parameter(Mandatory = $true)][string]$SignaturePath
          )
          `$CargoPath = '$cargoLiteral'
          & `$CargoPath run --manifest-path core/avorax_update_service/Cargo.toml --bin avorax_sign_manifest -- `$ManifestPath `$SignaturePath
          exit `$LASTEXITCODE
          "@
          $tempSigner = Join-Path $signerDirectory (".sign-update-manifest." + [System.Guid]::NewGuid().ToString("N") + ".ps1.tmp")
          $backupSigner = Join-Path $signerDirectory (".sign-update-manifest." + [System.Guid]::NewGuid().ToString("N") + ".ps1.bak")
          $encoding = New-Object System.Text.UTF8Encoding($false)
          try {
            [System.IO.File]::WriteAllText($tempSigner, $signerScript, $encoding)
            $tempSignerItem = Get-Item -LiteralPath $tempSigner -Force -ErrorAction Stop
            if (($tempSignerItem.Attributes -band [System.IO.FileAttributes]::ReparsePoint) -ne 0 -or -not ($tempSignerItem -is [System.IO.FileInfo])) {
              throw "Temporary update signer helper must be a regular non-reparse file: $tempSigner"
            }
            if (Test-Path -LiteralPath $signer) {
              [System.IO.File]::Replace($tempSigner, $signer, $backupSigner)
            } else {
              [System.IO.File]::Move($tempSigner, $signer)
            }
          } finally {
            if (Test-Path -LiteralPath $tempSigner) {
              Remove-Item -LiteralPath $tempSigner -Force
            }
            if (Test-Path -LiteralPath $backupSigner) {
              Remove-Item -LiteralPath $backupSigner -Force
            }
          }
          $env:AVORAX_UPDATE_SIGNER = '"' + $signer + '"'
          .\tools\update\avorax-build-update-package.ps1 -Version "${{ steps.version.outputs.version }}" -Channel "dev"

      - name: Upload installer artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: avorax-windows-installers-${{ steps.version.outputs.version }}
          path: |
            dist/Avorax-AntiVirus-${{ steps.version.outputs.version }}-x64.msi
            dist/Avorax-AntiVirus-${{ steps.version.outputs.version }}-x64-setup.exe
            dist/updates/Avorax-AntiVirus-${{ steps.version.outputs.version }}.aup
            dist/updates/update-feed.json
          if-no-files-found: error

      - name: Publish GitHub release
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3.0.1
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: Avorax ${{ steps.version.outputs.version }}
          prerelease: true
          fail_on_unmatched_files: true
          body: |
            Windows installer release for Avorax.

            Assets:
            - Avorax-AntiVirus-${{ steps.version.outputs.version }}-x64.msi
            - Avorax-AntiVirus-${{ steps.version.outputs.version }}-x64-setup.exe
            - Avorax-AntiVirus-${{ steps.version.outputs.version }}.aup
            - update-feed.json

            The current bundled AI model may be marked as a development model in its metadata. Avorax must not claim production AI protection unless `production_ready=true`.
          files: |
            dist/Avorax-AntiVirus-${{ steps.version.outputs.version }}-x64.msi
            dist/Avorax-AntiVirus-${{ steps.version.outputs.version }}-x64-setup.exe
            dist/updates/Avorax-AntiVirus-${{ steps.version.outputs.version }}.aup
            dist/updates/update-feed.json
